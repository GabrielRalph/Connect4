<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .loading {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        font-family: Arial, sans-serif;
        font-size: 3rem;
        color: #333;
        background-color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    body[loaded] .loading {
        display: none;
    }
    </style>
    <script>
        window.setLoader = (bool) => document.body.setAttribute("loaded", bool);
    </script>
</head>
<body>
    <connect-4-game game-id="connect4_001"></connect-4-game>
    <div class = "loading">
        LOADING
    </div>
</body>
<script src="connect-4-game.js" type = "module"></script>
<style>
    body {
        margin: 0;
    }

    @keyframes counter-win-pop {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.08); }
      100% { transform: scale(1.02); }
    }

    #main-board {
        transition: 0.4s ease-out transform;
    }
    connect-4-game {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
    }
    svg {
        max-width: 100vw;
        max-height: 100vh;
    }

    access-button {
        position: relative;
    }

    access-button:hover::after,
    access-button[hover]::after {
        content:  " ";
        width:  100%;
        display: block;
        height: 100%;
        background-color: rgb(255 255 255 / 17%);
        border-radius: 100em;
        border: 2px solid #0c3aa0;
        box-sizing: border-box;
    }
</style>
</html>
