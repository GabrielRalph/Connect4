<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .loading {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        font-family: Arial, sans-serif;
        font-size: 3rem;
        color: #333;
        background-color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    body {
 
        margin: 0;
        background: radial-gradient(circle at bottom, #ffd20024, #ba4e4e00), linear-gradient(180deg, #c2eaff, #edf9ff);
        width: 100vw;
        height: 100vh;
        font-family: system-ui, sans-serif;
    }

    body[loaded] .loading {
        display: none;
    }
    </style>

    <script>
        window.setLoader = (bool) => document.body.toggleAttribute("loaded", !bool);
    </script>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class = "background">
        <cloud-background ymin = "0" ymax = ".2">
            <img src ="assets/cloud1.png">
            <img src ="assets/cloud2.png">
            <img src ="assets/cloud3.png">
        </cloud-background>
    </div>

    <game-manager id = "game-manager"></game-manager>

    <div class = "loading">
        LOADING
    </div>
</body>

<script type = "module">
    import "./index.js";
    const gameManager = document.getElementById("game-manager");
    await gameManager.load();
    if (window.SquidlyAPI) {
        SquidlyAPI.firebaseOnValue("currentGame", gameID => {
            if (!gameID) {
                gameManager.goHome(false);
                console.log("No gameID, going home");
            } else {
                gameManager.joinGame(gameID, false);
                console.log("Joining game with ID: " + gameID);
            }
        })

        gameManager.addEventListener("game-join", e => {
            SquidlyAPI.firebaseSet("currentGame", e.detail.gameID);
        })
        document.body.toggleAttribute("squidly", true);
    }

    
</script>
</html>
