<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .loading {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        font-family: Arial, sans-serif;
        font-size: 3rem;
        color: #333;
        background: radial-gradient(circle at bottom, #ffd20024, #ba4e4e00), linear-gradient(180deg, #c2eaff, #edf9ff);
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        transition: 0.2s ease-out opacity;
    }

     .loader {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        gap: 3vmin;
    }
    .loader div {
        width: 5vmin;
        height: 5vmin;
        aspect-ratio: 1;
        border-radius: 10vmin;
        background-color: rgb(211, 28, 28);
        background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 31.256 37.716"><path d="M16.826,0h9.168v22.505h5.262v7.293h-5.262v7.918h-8.595v-7.918H0v-7.293S16.826,0,16.826,0ZM17.4,10.68l-8.804,11.825h8.804v-11.825Z" fill="%230005"/></svg>');
        background-size: 50% 50%;
        background-repeat: no-repeat;
        background-position: center;
        animation: bounce 1.5s infinite;
        display: flex;
        justify-content: center;
        align-items: center;
    }
   
    .loader div:nth-child(1) {
        animation-delay: 0s;
    }
    .loader div:nth-child(2) {
        animation-delay: -0.15s;
    }
    .loader div:nth-child(3) {
        animation-delay: -0.3s;
    }
    .loader div:nth-child(4) {
        animation-delay: -0.45s;
    }

    .loader div:nth-child(2n) {
        background-color: rgb(250, 191, 14);
       

    }
    @keyframes bounce {
        0%{
            transform: translateY(-150%);
            animation-timing-function: cubic-bezier(0.7, 0, 1, 1)
        }
        50%{
            transform: translateY(150%);
            animation-timing-function: cubic-bezier(0,0, .3, 1)
        }
        100%{
            transform: translateY(-150%);
        }
    } 



    body {
 
        margin: 0;
        background: radial-gradient(circle at bottom, #ffd20024, #ba4e4e00), linear-gradient(180deg, #c2eaff, #edf9ff);
        width: 100vw;
        height: 100vh;
        font-family: system-ui, sans-serif;
    }

    body[loaded] .loading {
        pointer-events: none;
        opacity: 0;
    }
    </style>

    <script>
        window.setLoader = (bool) => document.body.toggleAttribute("loaded", !bool);
    </script>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class = "background">
        <cloud-background ymin = "0" ymax = ".2">
            <img src ="assets/cloud1.png">
            <img src ="assets/cloud2.png">
            <img src ="assets/cloud3.png">
        </cloud-background>
    </div>

    <game-manager id = "game-manager"></game-manager>

    <div class = "loading">
        <div class = "loader"> 
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>
    </div>
</body>

<script type = "module">
    import "./index.js";
    const gameManager = document.getElementById("game-manager");
    await gameManager.load();
    if (window.SquidlyAPI) {
        SquidlyAPI.firebaseOnValue("currentGame", gameID => {
            if (!gameID) {
                gameManager.goHome(false);
                console.log("No gameID, going home");
            } else {
                gameManager.joinGame(gameID, false);
                console.log("Joining game with ID: " + gameID);
            }
        })

        gameManager.addEventListener("game-join", e => {
            SquidlyAPI.firebaseSet("currentGame", e.detail.gameID);
        })
        document.body.toggleAttribute("squidly", true);
    }

    
</script>
</html>
